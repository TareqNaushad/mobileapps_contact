plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.fuzzycontacts'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.fuzzycontacts"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Intentionally empty — uses only the Android framework (no AndroidX, no extra libs).
}
